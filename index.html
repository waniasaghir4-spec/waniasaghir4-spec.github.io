<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Site Trading</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#0b0f14;
  color:#fff;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:18px 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(10,15,20,0.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  z-index:1000;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:40px;
}

.logo h2{
  font-size:14px;
  letter-spacing:2px;
  color:#d4af37;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 20px;
  background:url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
  position:relative;
}

.hero::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

.hero-content{
  position:relative;
  max-width:800px;
}

.hero h1{
  font-size:54px;
  font-weight:700;
  line-height:1.2;
}

.hero span{
  color:#d4af37;
}

.hero p{
  margin-top:15px;
  opacity:0.8;
  font-size:16px;
  line-height:1.6;
}

/* BUTTON */
.btn{
  margin-top:25px;
  display:inline-block;
  padding:14px 30px;
  background:#d4af37;
  color:#000;
  font-weight:600;
  border-radius:8px;
  text-decoration:none;
  transition:0.3s;
  cursor:pointer;
}

.btn:hover{
  transform:translateY(-3px);
}

/* SECTIONS */
section{
  padding:90px 10%;
  text-align:center;
}

h2{
  font-size:30px;
  margin-bottom:15px;
  color:#d4af37;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  margin-top:30px;
}

.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  padding:22px;
  border-radius:10px;
}

/* CONTACT */
.contact{
  background:#0a0f16;
}

/* ================= WHATSAPP BUTTON FIX ================= */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:14px 18px;
  border-radius:50px;
  color:white;
  text-decoration:none;
  font-weight:700;
  z-index:9999;
}

/* ================= AI CHAT BOX ================= */
#aiChat{
  position:fixed;
  bottom:90px;
  right:20px;
  width:300px;
  background:#0b0f14;
  border:1px solid #d4af37;
  border-radius:12px;
  overflow:hidden;
  font-size:14px;
  z-index:9999;
  box-shadow:0 0 20px rgba(212,175,55,0.2);
}

#chatHeader{
  background:#d4af37;
  color:#000;
  padding:10px;
  font-weight:700;
}

#chatBody{
  height:200px;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  padding:8px 10px;
  border-radius:8px;
  max-width:85%;
}

.user{
  background:#1f2a36;
  align-self:flex-end;
}

.bot{
  background:rgba(212,175,55,0.15);
  border:1px solid rgba(212,175,55,0.3);
  align-self:flex-start;
}

#chatInputArea{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.1);
}

#userInput{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  background:#111;
  color:white;
}

#sendBtn{
  background:#d4af37;
  border:none;
  padding:10px 14px;
  cursor:pointer;
  font-weight:700;
}
</style>
</head>

<body>

<nav>
  <div class="logo">
    <img src="logo.png" alt="logo">
    <h2>ROYAL SITE TRADING</h2>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Building UAE’s Future <br><span>With Strength & Trust</span></h1>

    <!-- FIXED BUTTON -->
    <a class="btn" href="#about">Discover More</a>
  </div>
</div>

<section id="about">
  <h2>About Us</h2>
  <p>We supply high-quality construction materials across UAE.</p>
</section>

<section>
  <h2>Services</h2>
  <div class="cards">
    <div class="card">Construction Materials</div>
    <div class="card">Steel Supply</div>
    <div class="card">UAE Delivery</div>
    <div class="card">Bulk Orders</div>
  </div>
</section>

<section class="contact">
  <h2>Contact</h2>
  <p>📍 Abu Dhabi, UAE</p>
  <p>📞 +971XXXXXXXXX</p>
</section>

<!-- FIXED WHATSAPP BUTTON -->
<a class="whatsapp"
   href="https://wa.me/971XXXXXXXXX"
   target="_blank">
   WhatsApp
</a>

<!-- AI CHAT BOX -->
<div id="aiChat">
  <div id="chatHeader">💬 Ask AI Assistant</div>

  <div id="chatBody"></div>

  <div id="chatInputArea">
    <input id="userInput" type="text" placeholder="Ask something..." />
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

// SIMPLE CHAT FUNCTION
function sendMessage(){
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  setTimeout(()=>{
    addMessage(getReply(text),"bot");
  },500);
}

function addMessage(text,type){
  const chat = document.getElementById("chatBody");
  const msg = document.createElement("div");
  msg.className = "msg " + type;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function getReply(msg){
  msg = msg.toLowerCase();

  if(msg.includes("price")) return "Prices depend on quantity 📦";
  if(msg.includes("cement")) return "We supply premium cement 🏗";
  if(msg.includes("steel")) return "We provide industrial steel 🔩";
  if(msg.includes("delivery")) return "Fast UAE delivery available 🚚";
  if(msg.includes("hello")) return "Hello 👋 How can we help?";

  return "Thanks! Our team will contact you soon 📞";
}

// SMOOTH SCROLL FIX (extra safety)
document.querySelectorAll('a[href^="#"]').forEach(anchor=>{
  anchor.addEventListener("click",function(e){
    e.preventDefault();
    document.querySelector(this.getAttribute("href"))
    .scrollIntoView({behavior:"smooth"});
  });
});

</script>

</body>
</html>
