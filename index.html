<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Site Trading</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#070b14;
  color:white;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(10,15,25,0.7);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:40px;
}

.logo h2{
  color:#d4af37;
  font-size:16px;
  letter-spacing:2px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
  position:relative;
}

.hero::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.hero-content{
  position:relative;
  max-width:800px;
}

.hero h1{
  font-size:56px;
}

.hero span{
  color:#d4af37;
}

.btn{
  margin-top:20px;
  padding:14px 30px;
  background:#d4af37;
  color:black;
  font-weight:700;
  border-radius:10px;
  display:inline-block;
  cursor:pointer;
}

/* SECTIONS */
section{
  padding:100px 10%;
  text-align:center;
}

h2{
  color:#d4af37;
  margin-bottom:20px;
}

/* IMAGES */
.images{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.images img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:12px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  border:1px solid rgba(212,175,55,0.2);
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:14px;
  border-radius:50px;
  color:white;
  text-decoration:none;
  font-weight:700;
}

/* CHAT BUTTON (floating) */
#chatBtn{
  position:fixed;
  right:20px;
  bottom:90px;
  background:#d4af37;
  color:black;
  padding:12px 16px;
  border-radius:50px;
  font-weight:700;
  cursor:pointer;
  z-index:9999;
}

/* CHAT BOX (POPUP) */
#chatBox{
  position:fixed;
  right:20px;
  bottom:150px;
  width:320px;
  background:#0b0f14;
  border:1px solid #d4af37;
  border-radius:12px;
  display:none;
  overflow:hidden;
  z-index:9999;
}

#header{
  background:#d4af37;
  color:black;
  padding:10px;
  font-weight:700;
}

#body{
  height:220px;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  padding:8px;
  border-radius:8px;
  font-size:14px;
}

.user{
  background:#1c2433;
  align-self:flex-end;
}

.bot{
  background:rgba(212,175,55,0.15);
  align-self:flex-start;
}

#inputBox{
  display:flex;
  border-top:1px solid #222;
}

#input{
  flex:1;
  padding:10px;
  background:#111;
  border:none;
  color:white;
}

#send{
  background:#d4af37;
  border:none;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
    <h2>ROYAL SITE TRADING</h2>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Building UAE Future <br><span>With Strength & Trust</span></h1>
    <div class="btn" onclick="scrollToAbout()">Discover More</div>
  </div>
</div>

<!-- ABOUT -->
<section id="about">
  <h2>About Us</h2>
  <p>Premium supplier of construction materials across UAE projects.</p>

  <div class="cards">
    <div class="card">Steel & Cement Supply</div>
    <div class="card">Fast UAE Delivery</div>
    <div class="card">Trusted Contractors</div>
    <div class="card">10+ Years Experience</div>
  </div>
</section>

<!-- IMAGES -->
<section>
  <h2>Our Projects</h2>

  <div class="images">
    <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?auto=format&fit=crop&w=800&q=80">
    <img src="https://images.unsplash.com/photo-1581092334651-ddf26d9a09d0?auto=format&fit=crop&w=800&q=80">
    <img src="https://images.unsplash.com/photo-1600585154526-990dced4db0d?auto=format&fit=crop&w=800&q=80">
    <img src="https://images.unsplash.com/photo-1565008447742-97f6f38c985c?auto=format&fit=crop&w=800&q=80">
  </div>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/971501234567" target="_blank">WhatsApp</a>

<!-- CHAT BUTTON -->
<div id="chatBtn" onclick="toggleChat()">AI Chat</div>

<!-- CHAT BOX -->
<div id="chatBox">
  <div id="header">AI Assistant</div>

  <div id="body"></div>

  <div id="inputBox">
    <input id="input" placeholder="Ask something..." />
    <button id="send" onclick="send()">Send</button>
  </div>
</div>

<script>

function scrollToAbout(){
  document.getElementById("about").scrollIntoView({behavior:"smooth"});
}

/* TOGGLE CHAT */
function toggleChat(){
  let box=document.getElementById("chatBox");
  box.style.display = (box.style.display==="block") ? "none" : "block";
}

/* CHAT */
function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  setTimeout(()=>{
    add("We will contact you shortly 📞","bot");
  },600);
}

function add(t,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=t;
  document.getElementById("body").appendChild(div);
}

</script>

</body>
</html>
