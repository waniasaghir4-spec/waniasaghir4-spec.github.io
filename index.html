<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Site Trading</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#070b14;
color:white;
overflow-x:hidden;
background-image:
radial-gradient(circle at top left, rgba(212,175,55,0.08), transparent 40%),
radial-gradient(circle at bottom right, rgba(0,180,255,0.06), transparent 45%),
url("https://www.transparenttextures.com/patterns/dark-mosaic.png");
background-blend-mode: overlay;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
padding:14px 50px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(10,15,25,0.55);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(212,175,55,0.2);
z-index:1000;
}

/* FIXED LOGO (IMPORTANT FIX) */
.logo{
display:flex;
align-items:center;
gap:14px;
}

.logo img{
width:70px;
height:70px;
border-radius:12px;
}

.logo h2{
font-size:22px;
letter-spacing:1px;
}

/* NAV LINKS */
nav div a{
color:white;
margin-left:22px;
cursor:pointer;
text-decoration:none;
font-size:15px;
font-weight:500;
position:relative;
transition:0.3s;
}

nav div a::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0%;
height:2px;
background:#d4af37;
transition:0.3s;
}

nav div a:hover{
color:#d4af37;
}

nav div a:hover::after{
width:100%;
}

/* PAGES */
.page{display:none;padding-top:90px;}
.active{display:block;}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
}

.hero-bg{
position:absolute;
inset:0;
background:url("https://images.unsplash.com/photo-1504307651254-35680f356dfd") center/cover no-repeat;
z-index:-2;
filter:brightness(0.7);
transform:scale(1.05);
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,0.5),#070b14);
z-index:-1;
}

.hero-content{animation:fadeUp 1s ease;}

.hero h1{
font-size:clamp(30px,5vw,56px);
line-height:1.2;
}

.hero span{color:#d4af37;}

/* BUTTON */
.btn{
margin-top:25px;
padding:14px 32px;
background:linear-gradient(135deg,#d4af37,#f7d774);
color:black;
font-weight:700;
border-radius:12px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(212,175,55,0.4);
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(212,175,55,0.8);
}

/* SECTIONS */
section{
padding:120px 10% 80px;
text-align:center;
max-width:1200px;
margin:auto;
position:relative;
animation:fadeUp 1s ease;
}

section::before{
content:"";
position:absolute;
top:0;
left:10%;
right:10%;
height:1px;
background:linear-gradient(to right, transparent, rgba(212,175,55,0.3), transparent);
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:16px;
border:1px solid rgba(212,175,55,0.2);
backdrop-filter:blur(8px);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px) scale(1.02);
}

/* PROJECTS */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.project img{
width:100%;
height:200px;
object-fit:cover;
}

.project-text{padding:12px;text-align:left;}

/* OWNER */
.owner-box{
max-width:700px;
margin:auto;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:16px;
border:1px solid rgba(212,175,55,0.2);
}

/* FIXED ICON BUTTONS */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:14px;
border-radius:50px;
color:white;
text-decoration:none;
z-index:9999;
}

.instagram{
position:fixed;
bottom:90px;
right:20px;
background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);
padding:14px 16px;
border-radius:50px;
color:white;
text-decoration:none;
z-index:9999;
}

/* CHAT FIX */
#chatBtn{
position:fixed;
right:20px;
bottom:160px;
background:#d4af37;
color:black;
padding:12px 16px;
border-radius:50px;
font-weight:700;
cursor:pointer;
z-index:9999;
}

#chatBox{
position:fixed;
right:20px;
bottom:220px;
width:320px;
background:#0b0f14;
border:1px solid #d4af37;
border-radius:12px;
display:none;
z-index:9999;
}

#header{background:#d4af37;color:black;padding:10px;}
#body{height:220px;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.msg{padding:8px;border-radius:8px;}
.user{background:#1c2433;align-self:flex-end;}
.bot{background:rgba(212,175,55,0.15);}
#inputBox{display:flex;}
#input{flex:1;padding:10px;background:#111;color:white;border:none;}
#send{background:#d4af37;border:none;padding:10px;cursor:pointer;}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<nav>
<div class="logo">
<img src="logo.png" alt="Logo">
<h2>ROYAL SITE TRADING</h2>
</div>

<div>
<a onclick="showHome()"><i class="fa-solid fa-house"></i> Home</a>
<a onclick="showOwner()"><i class="fa-solid fa-user"></i> Owner</a>
</div>
</nav>

<div id="home" class="page active">

<div class="hero">
<div class="hero-bg"></div>
<div class="hero-overlay"></div>
<div class="hero-content">
<h1>Building UAE Future <br><span>With Strength & Trust</span></h1>
<div class="btn" onclick="scrollToAbout()">Discover More</div>
</div>
</div>

<section id="about">
<h2>About Us</h2>

<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:30px;align-items:center;">
<img src="logo.png" style="width:140px;height:140px;border-radius:16px;">
<div style="max-width:600px;text-align:left;">
<p>Royal Site Trading is a trusted supplier...</p>
</div>
</div>

<div class="cards">
<div class="card">🏗 High Quality</div>
<div class="card">🚚 Fast Delivery</div>
</div>
</section>

</div>

<div id="owner" class="page">
<section>
<h2>Meet the Owner</h2>
<div class="owner-box">
<img src="https://via.placeholder.com/150">
<h3>Saghir Ahmed</h3>
<p>Add your story here.</p>
</div>
</section>
</div>

<a class="whatsapp" href="https://wa.me/0552099822" target="_blank">WhatsApp</a>
<a class="instagram" href="https://instagram.com/YOURUSERNAME" target="_blank">Instagram</a>

<div id="chatBtn" onclick="toggleChat()">AI Chat</div>

<div id="chatBox">
<div id="header">AI Assistant</div>
<div id="body"></div>
<div id="inputBox">
<input id="input">
<button id="send" onclick="send()">Send</button>
</div>
</div>

<script>
function scrollToAbout(){
document.getElementById("about").scrollIntoView({behavior:"smooth"});
}

function showHome(){
document.getElementById("owner").classList.remove("active");
document.getElementById("home").classList.add("active");
}

function showOwner(){
document.getElementById("home").classList.remove("active");
document.getElementById("owner").classList.add("active");
}

function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display = box.style.display==="block"?"none":"block";
}

function send(){
let input=document.getElementById("input");
if(!input.value) return;
let div=document.createElement("div");
div.innerText=input.value;
document.getElementById("body").appendChild(div);
input.value="";
}
</script>

</body>
</html>
