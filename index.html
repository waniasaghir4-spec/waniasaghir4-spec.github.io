<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Site Trading</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#070b14;color:white;overflow-x:hidden;scroll-behavior:smooth;}

/* LOADER */
#loader{
position:fixed;
inset:0;
background:#070b14;
display:flex;
align-items:center;
justify-content:center;
z-index:99999;
font-size:22px;
letter-spacing:2px;
color:#d4af37;
}

/* NAV */
nav{
position:fixed;top:0;width:100%;
padding:15px 40px;
display:flex;justify-content:space-between;
align-items:center;
background:rgba(10,15,25,0.8);
backdrop-filter:blur(12px);
z-index:1000;
transition:0.3s;
}

nav.scrolled{
background:rgba(10,15,25,0.95);
}

.logo{display:flex;gap:10px;align-items:center;}
.logo img{width:42px;height:42px;border-radius:8px;}
.logo h2{color:#d4af37;font-size:16px;}

nav a{color:white;margin-left:15px;cursor:pointer;}
nav a:hover{color:#d4af37;}

.page{display:none;padding-top:90px;}
.active{display:block;}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
}

.hero-bg{
position:absolute;inset:0;
background:url("https://images.unsplash.com/photo-1504307651254-35680f356dfd") center/cover no-repeat;
filter:brightness(0.6);
z-index:-2;
}

.hero-overlay{
position:absolute;inset:0;
background:linear-gradient(to bottom,transparent,#070b14);
z-index:-1;
}

.hero-content{
animation:fadeUp 1s ease;
}

.hero h1{
font-size:clamp(30px,5vw,60px);
}

.hero span{color:#d4af37;}

.btn{
margin-top:25px;
padding:14px 30px;
background:linear-gradient(135deg,#d4af37,#f7d774);
color:black;
font-weight:700;
border-radius:12px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(212,175,55,0.5);
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 0 30px rgba(212,175,55,0.9);
}

/* SECTIONS */
section{
padding:100px 10%;
max-width:1200px;
margin:auto;
opacity:0;
transform:translateY(40px);
transition:0.6s;
}

section.show{
opacity:1;
transform:translateY(0);
}

h2{color:#d4af37;margin-bottom:20px;}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:16px;
border:1px solid rgba(212,175,55,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* PROJECTS */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.project img{
width:100%;
height:200px;
object-fit:cover;
transition:0.4s;
}

.project:hover img{
transform:scale(1.1);
}

/* OWNER */
.owner-box{
max-width:700px;
margin:auto;
padding:30px;
border-radius:16px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(212,175,55,0.2);
}

/* FLOATING GLOW */
.glow{
position:absolute;
width:300px;height:300px;
background:#d4af37;
filter:blur(120px);
opacity:0.15;
top:20%;
left:10%;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:14px;
border-radius:50px;
color:white;
}

/* CHAT */
#chatBtn{
position:fixed;
right:20px;
bottom:90px;
background:#d4af37;
color:black;
padding:12px;
border-radius:50px;
cursor:pointer;
}

#chatBox{
position:fixed;
right:20px;
bottom:150px;
width:320px;
background:#0b0f14;
border:1px solid #d4af37;
display:none;
}

#body{height:200px;overflow:auto;padding:10px;}
.msg{padding:6px;margin:5px 0;}
.user{background:#1c2433;}
.bot{background:#222;}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div id="loader">ROYAL SITE TRADING</div>

<nav id="nav">
<div class="logo">
<img src="logo.png">
<h2>ROYAL SITE TRADING</h2>
</div>
<div>
<a onclick="showHome()">Home</a>
<a onclick="showOwner()">Owner</a>
</div>
</nav>

<div class="glow"></div>

<div id="home" class="page active">

<div class="hero">
<div class="hero-bg"></div>
<div class="hero-overlay"></div>

<div class="hero-content">
<h1>Building UAE Future <br><span>With Strength & Trust</span></h1>
<div class="btn" onclick="scrollToAbout()">Discover More</div>
</div>
</div>

<section id="about">
<h2>About Us</h2>
<p>Premium construction supplier delivering excellence across UAE.</p>
</section>

<section>
<h2>Services</h2>
<div class="cards">
<div class="card">Steel Supply</div>
<div class="card">Construction Materials</div>
<div class="card">Fast Delivery</div>
</div>
</section>

<section>
<h2>Projects</h2>
<div class="projects">
<img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
<img src="https://images.unsplash.com/photo-1600585154526-990dced4db0d">
</div>
</section>

</div>

<div id="owner" class="page">
<section>
<h2>Owner</h2>
<div class="owner-box">Add details here</div>
</section>
</div>

<a class="whatsapp" href="#">WhatsApp</a>

<div id="chatBtn" onclick="toggleChat()">Chat</div>
<div id="chatBox">
<div id="body"></div>
<input id="input"><button onclick="send()">Send</button>
</div>

<script>

/* LOADER */
window.onload = () => {
document.getElementById("loader").style.display="none";
};

/* NAV SCROLL */
window.addEventListener("scroll",()=>{
document.getElementById("nav").classList.toggle("scrolled",window.scrollY>50);
});

/* SCROLL ANIMATION */
const sections = document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
const top = sec.getBoundingClientRect().top;
if(top < window.innerHeight - 100){
sec.classList.add("show");
}
});
});

/* NAV */
function showHome(){
home.classList.add("active");
owner.classList.remove("active");
}

function showOwner(){
owner.classList.add("active");
home.classList.remove("active");
}

/* CHAT */
function toggleChat(){
chatBox.style.display = chatBox.style.display==="block"?"none":"block";
}

function send(){
let msg=input.value;
if(!msg) return;

body.innerHTML+=`<div class="msg user">${msg}</div>`;
input.value="";

setTimeout(()=>{
body.innerHTML+=`<div class="msg bot">We will assist you shortly.</div>`;
},500);
}

</script>

</body>
</html>
